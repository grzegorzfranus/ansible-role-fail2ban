---
# =============================================================================
# Ansible Role: Fail2ban - Handlers
# =============================================================================
# Service management operations triggered by tasks.
# =============================================================================

- name: Fail2ban | handlers | Restart fail2ban service
  become: true
  ansible.builtin.service:
    name: "{{ fail2ban_service_name }}"
    state: restarted
  register: __fail2ban_service_restart_result
  failed_when: __fail2ban_service_restart_result.failed
  when: >
    fail2ban_service_enabled | bool

- name: Fail2ban | handlers | Reload systemd daemon
  become: true
  ansible.builtin.systemd_service:
    daemon_reload: true

- name: Fail2ban | handlers | Report service restart status
  ansible.builtin.debug:
    msg:
      - "Fail2ban Service Restart Handler Executed:"
      - "   Service Name: {{ fail2ban_service_name }}"
      - "   Restart Status: {{ 'Success' if not __fail2ban_service_restart_result.failed else 'Failed' }}"
      - "   Service State: {{ __fail2ban_service_restart_result.state | default('unknown') }}"
    verbosity: 1
  when: >
    __fail2ban_service_restart_result is defined
