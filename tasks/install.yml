---
# Fail2ban Install — Package installation with EPEL support and verification.

# EPEL Installation (RedHat/Oracle/Rocky Linux)
- name: Fail2ban | install | Install EPEL package for Oracle Linux distribution
  become: true
  ansible.builtin.package:
    name: "oracle-epel-release-el{{ ansible_facts['distribution_major_version'] }}"
    state: present
    update_cache: true
  when:
    - ansible_facts['os_family'] | lower == "redhat"
    - ansible_facts['distribution'] | lower == "oraclelinux"

- name: Fail2ban | install | Install EPEL package for RedHat family
  become: true
  ansible.builtin.package:
    name: "epel-release"
    state: present
    update_cache: true
  when:
    - ansible_facts['os_family'] | lower == "redhat"
    - ansible_facts['distribution'] | lower != "oraclelinux"
    - (fail2ban_enable_epel | default(true)) | bool

# Package Installation
- name: Fail2ban | install | Install Fail2ban package
  become: true
  ansible.builtin.package:
    name: "{{ fail2ban_package_name }}"
    state: present
    update_cache: true
  register: __fail2ban_package_install_result
  until: __fail2ban_package_install_result is succeeded
  retries: 3
  delay: 10

# Post-Installation Verification
- name: Fail2ban | install | Verify Fail2ban installation
  ansible.builtin.command: "fail2ban-client --version"
  register: __fail2ban_installed_version
  changed_when: false
  failed_when: __fail2ban_installed_version.rc != 0

- name: Fail2ban | install | Report installation results
  ansible.builtin.debug:
    msg:
      - "Fail2ban Installation Completed Successfully:"
      - "   Installed Version: {{ __fail2ban_installed_version.stdout }}"
      - "   Package Name: {{ fail2ban_package_name }}"
      - "   Installation Changed: {{ 'Yes' if __fail2ban_package_install_result.changed else 'No (already installed)' }}"
      - "   Package Manager: {{ ansible_facts['pkg_mgr'] }}"
    verbosity: 1
