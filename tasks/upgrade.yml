---
# Fail2ban Upgrade — Package upgrade with pre/post verification.

# Pre-Upgrade Validation
- name: Fail2ban | upgrade | Check current Fail2ban version before upgrade
  ansible.builtin.command: "fail2ban-client --version"
  register: __fail2ban_version_before
  failed_when: false
  changed_when: false

- name: Fail2ban | upgrade | Display pre-upgrade information
  ansible.builtin.debug:
    msg:
      - "Fail2ban Package Upgrade Starting:"
      - "   Current Version: {{ __fail2ban_version_before.stdout if __fail2ban_version_before.rc == 0 else 'Not installed or not responding' }}"
      - "   Package Name: {{ fail2ban_package_name }}"
      - "   Package Manager: {{ ansible_facts['pkg_mgr'] }}"
    verbosity: 1

# Package Upgrade
- name: Fail2ban | upgrade | Upgrade Fail2ban package to the latest version
  become: true
  ansible.builtin.package:
    name: "{{ fail2ban_package_name }}"
    state: latest  # noqa package-latest
    update_cache: true
  register: __fail2ban_upgrade_result
  until: __fail2ban_upgrade_result is succeeded
  retries: 3
  delay: 10
  notify: Fail2ban | handlers | Restart fail2ban service

# Post-Upgrade Verification
- name: Fail2ban | upgrade | Check Fail2ban version after upgrade
  ansible.builtin.command: "fail2ban-client --version"
  register: __fail2ban_version_after
  changed_when: false
  failed_when: __fail2ban_version_after.rc != 0

- name: Fail2ban | upgrade | Verify Fail2ban service status after upgrade
  ansible.builtin.service:
    name: "{{ fail2ban_service_name }}"
  register: __fail2ban_service_status
  failed_when: false

# Upgrade Summary
- name: Fail2ban | upgrade | Report upgrade results
  ansible.builtin.debug:
    msg:
      - "Fail2ban Package Upgrade Completed Successfully:"
      - "   Previous Version: {{ __fail2ban_version_before.stdout if __fail2ban_version_before.rc == 0 else 'Unknown' }}"
      - "   Current Version: {{ __fail2ban_version_after.stdout }}"
      - "   Package Changed: {{ 'Yes' if __fail2ban_upgrade_result.changed else 'No (already latest)' }}"
      - "   Service Status: {{ __fail2ban_service_status.status.ActiveState | default('unknown') if __fail2ban_service_status.status is defined else 'unknown' }}"
      - "   Package Manager: {{ ansible_facts['pkg_mgr'] }}"
    verbosity: 1
